name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Install gcc
        run: sudo apt-get update && sudo apt-get install -y gcc

      - name: Tidy modules
        run: go mod tidy

      - name: Build
        run: CGO_ENABLED=1 go build ./...

      - name: Test
        run: CGO_ENABLED=1 go test ./... -v

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Install gcc
        run: sudo apt-get update && sudo apt-get install -y gcc

      - uses: golangci/golangci-lint-action@v4
        with:
          version: latest
