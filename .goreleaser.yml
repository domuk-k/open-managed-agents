version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: oma
    main: ./cmd/oma
    binary: oma
    env:
      - CGO_ENABLED=1
    targets:
      - linux_amd64
      - linux_arm64
      - darwin_arm64
      - darwin_amd64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - format: tar.gz
    name_template: "oma_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

brews:
  - name: oma
    repository:
      owner: domuk-k
      name: homebrew-oma
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/domuk-k/open-managed-agents"
    description: "Open Managed Agents - self-hosted agent platform"
    license: "MIT"
    install: |
      bin.install "oma"
    test: |
      system "#{bin}/oma", "--help"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
